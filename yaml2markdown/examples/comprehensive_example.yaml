# Project Overview
overview:
  summary: "This tool converts YAML files to beautifully formatted Markdown documents with support for images, links, and rich content."
  features:
    - "Automatic link detection and formatting"
    - "Image embedding with customizable dimensions"
    - "Table generation from structured data"
    - "Code block formatting"
    - "Quote and blockquote support"

