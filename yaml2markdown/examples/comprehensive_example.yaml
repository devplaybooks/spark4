# Code Examples
code_examples:
  python_usage:
    code: |
      from yaml2markdown import YamlToMarkdownConverter
      
      converter = YamlToMarkdownConverter(image_width=400)
      markdown = converter.convert_file('input.yaml', 'output.md')
      print("Conversion completed!")
    language: "python"
  
  cli_usage:
    code: |
      # Convert YAML to Markdown
      yaml2markdown input.yaml -o output.md --width 500
      
      # Preview conversion
      yaml2markdown preview -f input.yaml
      
      # Validate YAML file
      yaml2markdown validate input.yaml
    language: "bash"

# Installation Steps
installation:
  requirements:
    - "Python 3.8 or higher"
    - "pip package manager"
  
  steps:
    - step: "Clone the repository"
      command: "git clone https://github.com/devplaybooks/spark4.git"
    - step: "Navigate to project directory"
      command: "cd spark4/yaml2markdown"
    - step: "Install dependencies"
      command: "pip install -r requirements.txt"
    - step: "Install the package"
      command: "pip install -e ."

